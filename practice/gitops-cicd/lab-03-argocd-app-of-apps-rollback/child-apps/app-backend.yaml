apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: child-backend
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/<YOUR-GITHUB-USER>/<YOUR-REPO>.git'
    targetRevision: HEAD
    path: apps-code/backend
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
